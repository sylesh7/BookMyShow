<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - BookMyShow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-film"></i>
                <span>BookMyShow</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="bookings.html"><i class="fas fa-ticket-alt"></i> My Bookings</a></li>
            </ul>
        </div>
    </nav>

    <!-- Payment Section -->
    <section class="payment-section">
        <div class="container">
            <div class="payment-grid">
                <!-- Order Summary -->
                <div class="order-summary-card">
                    <h2><i class="fas fa-shopping-cart"></i> Booking Summary</h2>
                    <div class="movie-summary">
                        <div class="summary-poster">
                            <i class="fas fa-film fa-3x"></i>
                        </div>
                        <div class="summary-details">
                            <h3 id="summaryMovieName">Movie Name</h3>
                            <p><i class="fas fa-calendar"></i> <span id="summaryDate">Date & Time</span></p>
                            <p><i class="fas fa-building"></i> Premium Cinema Hall, Mumbai</p>
                        </div>
                    </div>
                    
                    <div class="order-details">
                        <div class="detail-row">
                            <span>Seats:</span>
                            <span id="summarySeats">-</span>
                        </div>
                        <div class="detail-row">
                            <span>Ticket Price:</span>
                            <span>₹<span id="summaryTicketPrice">0</span></span>
                        </div>
                        <div class="detail-row">
                            <span>Number of Seats:</span>
                            <span id="summaryNumberOfSeats">0</span>
                        </div>
                        <div class="detail-row">
                            <span>Convenience Fee:</span>
                            <span>₹<span id="convenienceFee">50</span></span>
                        </div>
                        <hr>
                        <div class="detail-row total">
                            <span>Total Amount:</span>
                            <span class="total-amount">₹<span id="finalTotal">0</span></span>
                        </div>
                    </div>
                </div>

                <!-- Payment Form -->
                <div class="payment-form-card">
                    <h2><i class="fas fa-credit-card"></i> Payment Details</h2>
                    
                    <form id="paymentForm">
                        <div class="form-group">
                            <label for="customerName">
                                <i class="fas fa-user"></i> Full Name *
                            </label>
                            <input type="text" id="customerName" placeholder="Enter your full name" required>
                        </div>

                        <div class="form-group">
                            <label for="email">
                                <i class="fas fa-envelope"></i> Email *
                            </label>
                            <input type="email" id="email" placeholder="Enter your email" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">
                                <i class="fas fa-phone"></i> Phone Number *
                            </label>
                            <input type="tel" id="phone" placeholder="Enter your phone number" required>
                        </div>

                        <div class="payment-methods">
                            <h3>Select Payment Method</h3>
                            <div class="payment-options">
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="card" checked>
                                    <div class="option-content">
                                        <i class="fas fa-credit-card"></i>
                                        <span>Credit/Debit Card</span>
                                    </div>
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="upi">
                                    <div class="option-content">
                                        <i class="fas fa-mobile-alt"></i>
                                        <span>UPI</span>
                                    </div>
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="wallet">
                                    <div class="option-content">
                                        <i class="fas fa-wallet"></i>
                                        <span>Wallet</span>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success btn-large btn-block">
                            <i class="fas fa-lock"></i> Pay ₹<span id="paymentTotal">0</span>
                        </button>

                        <p class="secure-text">
                            <i class="fas fa-shield-alt"></i> Your payment information is secure
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/payment.js"></script>
</body>
</html>
